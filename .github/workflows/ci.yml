name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Secret scan (heuristic)
        run: npm run verify-secrets

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run type-check

      - name: Test
        run: npm run test:ci
        env:
          ENCRYPTION_KEY: '0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef'

      - name: Build
        run: npm run build
        env:
          ENCRYPTION_KEY: '0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef'
          NEXT_PUBLIC_PRIVY_APP_ID: 'placeholder_ci'
          GROQ_API_KEY: 'placeholder'
